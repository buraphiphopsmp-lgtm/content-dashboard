<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Performance Dashboard – SMP</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root{--bg:#0f1115;--card:#191c24;--card2:#21252f;--line:#2b303c;--txt:#e7eaf0;--muted:#9aa3b2;--accent:#5b8cff;--accent2:#27c4a6;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:'Segoe UI',Tahoma,'Sarabun',system-ui,sans-serif;font-size:14px}
  .wrap{max-width:1320px;margin:0 auto;padding:24px}
  .topbar{display:flex;flex-wrap:wrap;align-items:center;gap:18px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .subbar{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px}
  h1{font-size:24px;margin:0}
  .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  select{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit}
  label.fl{color:var(--muted);font-size:12px;margin-right:4px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn:hover{filter:brightness(1.1)} .btn:disabled{opacity:.6;cursor:default}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)} .btn.ghost:hover{color:var(--txt);filter:none}
  .dlt{font-size:12px;font-weight:700;margin-left:6px;white-space:nowrap}.dlt.up{color:#2ecc71}.dlt.down{color:#ff6b6b}
  .upd{display:inline-flex;align-items:center;gap:4px;background:rgba(39,196,166,.12);color:var(--accent2);border:1px solid rgba(39,196,166,.35);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;white-space:nowrap}
  .nav{display:flex;gap:8px}
  .nav a{padding:8px 16px;border-radius:10px;border:1px solid var(--line);color:var(--muted);background:var(--card);font-weight:600;font-size:13px;text-decoration:none}
  .nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .kpi .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .kpi .val{font-size:26px;font-weight:700;margin-top:6px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .card h3{margin:0 0 12px;font-size:15px;font-weight:600}
  canvas{max-height:320px}
  .foot{color:var(--muted);font-size:12px;margin-top:18px;text-align:center}
  @media(max-width:880px){.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>📊 Content Performance Dashboard</h1>
    <nav class="nav">
      <a href="/" class="active">📊 ภาพรวม</a>
      <a href="/pillar-analysis.html">🎯 วิเคราะห์ตาม Pillar</a>
    </nav>
  </div>

  <div class="subbar">
    <div class="sub" id="sub">กำลังโหลดข้อมูล…</div>
    <div class="filters">
      <span><label class="fl">เดือน</label><select id="fMonth"><option value="">ทั้งหมด</option></select></span>
      <span><label class="fl">เทียบกับ</label><select id="fCompare"><option value="">—</option></select></span>
      <span><label class="fl">แพลตฟอร์ม</label><select id="fPlatform"><option value="">ทั้งหมด</option></select></span>
      <span><label class="fl">Pillar</label><select id="fPillar"><option value="">ทั้งหมด</option></select></span>
      <button id="apply" class="btn">ใช้ตัวกรอง</button>
      <button id="clear" class="btn ghost">ล้างตัวกรอง</button>
      <button id="refresh" class="btn">🔄 รีเฟรชข้อมูล</button>
      <span id="lastUpdate" class="upd"></span>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="label">Impressions รวม</div><div class="val" id="kImp">–</div></div>
    <div class="kpi"><div class="label">Engagement รวม</div><div class="val" id="kEng">–</div></div>
    <div class="kpi"><div class="label">จำนวนโพสต์</div><div class="val" id="kPosts">–</div></div>
    <div class="kpi"><div class="label">Engagement Rate</div><div class="val" id="kRate">–</div></div>
  </div>

  <div class="grid">
    <div class="card"><h3>Impressions ตามแพลตฟอร์ม</h3><canvas id="cImpPlat"></canvas></div>
    <div class="card"><h3>สัดส่วนจำนวนโพสต์ตามแพลตฟอร์ม</h3><canvas id="cPostsPlat"></canvas></div>
    <div class="card"><h3>Engagement ตาม Content Pillar</h3><canvas id="cEngPillar"></canvas></div>
    <div class="card"><h3>Engagement Rate ตาม Pillar</h3><canvas id="cRatePillar"></canvas></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
const PLAT_COLORS={Facebook:'#1877F2',Instagram:'#E4405F',TikTok:'#25F4EE',X:'#E7E9EA',YouTube:'#FF0000'};
const contrast=h=>{const c=(h||'').replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return (0.299*r+0.587*g+0.114*b)/255>0.6?'#11151c':'#fff';};
const fmt=n=>n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':Math.round(n).toLocaleString();
const pct=n=>(n*100).toFixed(2)+'%';
function deltaHTML(cur,prev){if(prev===undefined||prev===null)return '';if(prev===0)return cur>0?'<span class="dlt up">▲ ใหม่</span>':'';const d=(cur-prev)/prev*100,up=d>=0;return `<span class="dlt ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(d).toFixed(1)}%</span>`;}
let DATA, charts={};

Chart.register(ChartDataLabels);
Chart.defaults.color='#9aa3b2'; Chart.defaults.borderColor='#2b303c';
Chart.defaults.font.family="'Segoe UI',Tahoma,'Sarabun',sans-serif";

function groupSum(rows,key){
  const m={};
  for(const r of rows){const k=r[key]||'(ไม่ระบุ)';
    if(!m[k])m[k]={reactions:0,impressions:0,posts:0};
    m[k].reactions+=r.reactions;m[k].impressions+=r.impressions;m[k].posts+=r.posts;}
  return m;
}
function makeChart(id,type,labels,data,opts){
  if(charts[id])charts[id].destroy();
  const datasets=opts.datasets||[Object.assign({data},opts.ds||{})];
  charts[id]=new Chart(document.getElementById(id),{type,
    data:{labels,datasets},
    options:Object.assign({responsive:true,plugins:{legend:{display:opts.legend||false}}},opts.options||{})});
}
function render(){
  const fm=document.getElementById('fMonth').value;
  const fp=document.getElementById('fPlatform').value;
  const fpi=document.getElementById('fPillar').value;
  const rows=DATA.summary.filter(r=>(!fm||r.month===fm)&&(!fp||r.platform===fp)&&(!fpi||r.pillar===fpi));
  const tImp=rows.reduce((s,r)=>s+r.impressions,0);
  const tEng=rows.reduce((s,r)=>s+r.reactions,0);
  const tPosts=rows.reduce((s,r)=>s+r.posts,0);
  const fc=document.getElementById('fCompare').value;
  const cmp=fc?DATA.summary.filter(r=>r.month===fc&&(!fp||r.platform===fp)&&(!fpi||r.pillar===fpi)):null;
  const cImp=cmp?cmp.reduce((s,r)=>s+r.impressions,0):0;
  const cEng=cmp?cmp.reduce((s,r)=>s+r.reactions,0):0;
  const cPosts=cmp?cmp.reduce((s,r)=>s+r.posts,0):0;
  document.getElementById('kImp').innerHTML=fmt(tImp)+(cmp?deltaHTML(tImp,cImp):'');
  document.getElementById('kEng').innerHTML=fmt(tEng)+(cmp?deltaHTML(tEng,cEng):'');
  document.getElementById('kPosts').innerHTML=tPosts.toLocaleString()+(cmp?deltaHTML(tPosts,cPosts):'');
  document.getElementById('kRate').innerHTML=(tImp?pct(tEng/tImp):'–')+(cmp?deltaHTML(tImp?tEng/tImp:0,cImp?cEng/cImp:0):'');

  const CMPCLR='#5a6473', labP=fm||'ช่วงหลัก', labC=fc, grouped=!!cmp;
  const dl=(color,align,rot)=>({display:'auto',clamp:true,color:color||'#cdd6e6',anchor:'end',align:align||'end',rotation:rot||0,font:{weight:'600',size:grouped?9:11},formatter:v=>v>0?fmt(v):''});

  const byPlat=groupSum(rows,'platform');
  const cByPlat=cmp?groupSum(cmp,'platform'):null;
  const platLabels=Object.keys(byPlat).sort((a,b)=>byPlat[b].impressions-byPlat[a].impressions);
  makeChart('cImpPlat','bar',platLabels,null,
    {legend:grouped,
     datasets:[{data:platLabels.map(p=>byPlat[p].impressions),backgroundColor:platLabels.map(p=>PLAT_COLORS[p]||'#5b8cff'),borderRadius:6,label:labP}]
       .concat(cmp?[{data:platLabels.map(p=>cByPlat[p]?cByPlat[p].impressions:0),backgroundColor:CMPCLR,borderRadius:6,label:labC}]:[]),
     options:{indexAxis:'y',layout:{padding:{right:54}},scales:{x:{ticks:{callback:fmt}}},
       plugins:{legend:{display:grouped,labels:{boxWidth:12}},datalabels:dl('#cdd6e6','right')}}});

  const postCols=platLabels.map(p=>PLAT_COLORS[p]||'#5b8cff');
  makeChart('cPostsPlat','doughnut',platLabels,null,
    {legend:true,
     datasets:[{data:platLabels.map(p=>byPlat[p].posts),backgroundColor:postCols,label:labP}]
       .concat(cmp?[{data:platLabels.map(p=>cByPlat[p]?cByPlat[p].posts:0),backgroundColor:postCols.map(c=>c+'66'),label:labC,weight:0.5}]:[]),
     options:{plugins:{legend:{position:'right'},
       datalabels:{color:c=>contrast((c.dataset.backgroundColor[c.dataIndex]||'#888888').slice(0,7)),font:{weight:'700',size:11},formatter:(v,c)=>c.datasetIndex===0&&v>0?v:''},
       tooltip:{callbacks:{label:c=>`${c.label} (${c.datasetIndex===0?labP:labC}): ${c.parsed}`}}}}});

  const byPil=groupSum(rows,'pillar');
  const cByPil=cmp?groupSum(cmp,'pillar'):null;
  const pilLabels=Object.keys(byPil).sort((a,b)=>byPil[b].reactions-byPil[a].reactions);
  makeChart('cEngPillar','bar',pilLabels,null,
    {legend:grouped,
     datasets:[{data:pilLabels.map(p=>byPil[p].reactions),backgroundColor:'#27c4a6',borderRadius:6,label:labP}]
       .concat(cmp?[{data:pilLabels.map(p=>cByPil[p]?cByPil[p].reactions:0),backgroundColor:CMPCLR,borderRadius:6,label:labC}]:[]),
     options:{layout:{padding:{top:grouped?56:24}},scales:{y:{ticks:{callback:fmt}}},
       plugins:{legend:{display:grouped,labels:{boxWidth:12}},datalabels:dl('#cdd6e6','top',grouped?-90:0)}}});

  const rateLabels=pilLabels.slice().sort((a,b)=>(byPil[b].reactions/(byPil[b].impressions||1))-(byPil[a].reactions/(byPil[a].impressions||1)));
  const rp=p=>byPil[p]&&byPil[p].impressions?byPil[p].reactions/byPil[p].impressions*100:0;
  const rc=p=>cByPil&&cByPil[p]&&cByPil[p].impressions?cByPil[p].reactions/cByPil[p].impressions*100:0;
  makeChart('cRatePillar','bar',rateLabels,null,
    {legend:grouped,
     datasets:[{data:rateLabels.map(rp),backgroundColor:'#5b8cff',borderRadius:6,label:labP}]
       .concat(cmp?[{data:rateLabels.map(rc),backgroundColor:CMPCLR,borderRadius:6,label:labC}]:[]),
     options:{layout:{padding:{top:grouped?56:24}},scales:{y:{ticks:{callback:v=>v+'%'}}},
       plugins:{legend:{display:grouped,labels:{boxWidth:12}},tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(2)+'%'}},
         datalabels:{display:'auto',clamp:true,color:'#cdd6e6',anchor:'end',align:'top',rotation:grouped?-90:0,font:{weight:'600',size:grouped?9:11},formatter:v=>v>0?v.toFixed(1)+'%':''}}}});
}
function fmtUpdated(s){const m=(s||'').match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})/);if(!m)return s||'-';
  const d=new Date(Date.UTC(+m[1],+m[2]-1,+m[3],+m[4],+m[5]));
  return d.toLocaleString('th-TH',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+' น.';}
function setSub(){const m=DATA.meta||{};
  document.getElementById('sub').textContent=`ข้อมูล: ${m.source||''} · เดือน ${m.month||''} · ${(DATA.posts||[]).length} โพสต์`;
  const el=document.getElementById('lastUpdate');if(el)el.textContent='🕒 อัปเดตล่าสุด: '+fmtUpdated(m.generatedAt);}
function loadData(fresh){
  const btn=document.getElementById('refresh');
  if(btn){btn.disabled=true;btn.textContent='⏳ กำลังรีเฟรช...';}
  return fetch('content-data.json?'+(fresh?'fresh=1&':'')+Date.now()).then(r=>r.json()).then(d=>{
    DATA=d; setSub(); render();
  }).catch(e=>{document.getElementById('sub').textContent='โหลดข้อมูลไม่สำเร็จ';console.error(e);})
   .finally(()=>{if(btn){btn.disabled=false;btn.textContent='🔄 รีเฟรชข้อมูล';}});
}
loadData(false).then(()=>{
  document.getElementById('foot').textContent='ดึงสดจาก Google Sheet · ดูรายโพสต์ทั้งหมดได้ที่หน้า "วิเคราะห์ตาม Pillar"';
  const months=[...new Set(DATA.summary.map(r=>r.month).filter(Boolean))];
  const plats=[...new Set(DATA.summary.map(r=>r.platform))];
  const pils=[...new Set(DATA.summary.map(r=>r.pillar))];
  months.forEach(p=>document.getElementById('fMonth').innerHTML+=`<option>${p}</option>`);
  months.forEach(p=>document.getElementById('fCompare').innerHTML+=`<option>${p}</option>`);
  plats.forEach(p=>document.getElementById('fPlatform').innerHTML+=`<option>${p}</option>`);
  pils.forEach(p=>document.getElementById('fPillar').innerHTML+=`<option>${p}</option>`);
  document.getElementById('apply').onclick=render;
  document.getElementById('clear').onclick=()=>{['fMonth','fCompare','fPlatform','fPillar'].forEach(id=>document.getElementById(id).value='');render();};
  document.getElementById('refresh').onclick=()=>loadData(true);
});
</script>
</body>
</html>
