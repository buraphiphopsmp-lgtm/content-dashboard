<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Content – SMP</title>
<style>
  :root{--bg:#0f1115;--card:#191c24;--card2:#21252f;--line:#2b303c;--txt:#e7eaf0;--muted:#9aa3b2;--accent:#5b8cff;--accent2:#27c4a6;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:'Segoe UI',Tahoma,'Sarabun',system-ui,sans-serif;font-size:14px}
  .wrap{max-width:1320px;margin:0 auto;padding:24px}
  .topbar{display:flex;flex-wrap:wrap;align-items:center;gap:18px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  h1{font-size:24px;margin:0}
  .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .subbar{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px}
  .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  select,input[type=date]{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit}
  label.fl{color:var(--muted);font-size:12px;margin-right:4px}
  .nav{display:flex;gap:8px}
  .nav a{padding:8px 16px;border-radius:10px;border:1px solid var(--line);color:var(--muted);background:var(--card);font-weight:600;font-size:13px;text-decoration:none}
  .nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn:hover{filter:brightness(1.1)} .btn:disabled{opacity:.6;cursor:default}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)} .btn.ghost:hover{color:var(--txt);filter:none}
  .upd{display:inline-flex;align-items:center;gap:4px;background:rgba(39,196,166,.12);color:var(--accent2);border:1px solid rgba(39,196,166,.35);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;white-space:nowrap}
  h2.sec{font-size:17px;margin:24px 0 12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .card h3{margin:0 0 10px;font-size:14px;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
  td.num,th.num{text-align:right;white-space:nowrap}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
  .rk{font-weight:700;color:var(--muted)}
  .msg{color:var(--muted);max-width:380px}
  a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
  .foot{color:var(--muted);font-size:12px;margin:20px 0;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>🏆 Top Content</h1>
    <nav class="nav">
      <a href="/">📊 ภาพรวม</a>
      <a href="/pillar-analysis.html">🎯 วิเคราะห์ตาม Pillar</a>
      <a href="/top-content.html" class="active">🏆 Top Content</a>
    </nav>
  </div>

  <div class="subbar">
    <div class="sub" id="sub">กำลังโหลดข้อมูล…</div>
    <div class="filters">
      <span><label class="fl">วันที่</label><input type="date" id="dFrom"> <span style="color:var(--muted)">–</span> <input type="date" id="dTo"></span>
      <span><label class="fl">เรียงตาม</label><select id="metric"><option value="engagement">Engagement</option><option value="impressions">Impressions</option></select></span>
      <span><label class="fl">แสดง Top</label><select id="topN"><option>5</option><option>10</option><option>20</option></select></span>
      <button id="apply" class="btn">ใช้ตัวกรอง</button>
      <button id="clear" class="btn ghost">ล้างตัวกรอง</button>
      <button id="refresh" class="btn">🔄 รีเฟรชข้อมูล</button>
      <span id="lastUpdate" class="upd"></span>
    </div>
  </div>

  <h2 class="sec">🏆 Top Content แต่ละแพลตฟอร์ม</h2>
  <div id="byPlatform"></div>

  <h2 class="sec">📊 Ranking Content แต่ละ Pillar</h2>
  <div id="byPillar"></div>

  <div class="foot" id="foot"></div>
</div>

<script>
const PLAT_COLORS={Facebook:'#1877F2',Instagram:'#E4405F',TikTok:'#25F4EE',X:'#E7E9EA',YouTube:'#FF0000'};
const PALETTE=['#5b8cff','#27c4a6','#E4405F','#f5a524','#9b8cff','#25F4EE','#ff7a59','#7ee787','#f78fb3','#54a0ff','#c9cdd6'];
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const v=id=>document.getElementById(id).value;
const sum=(a,k)=>a.reduce((s,p)=>s+(p[k]||0),0);
let DATA;

function pillarColorMap(){const ps=[...new Set((DATA.posts||[]).map(p=>p.pillar).filter(Boolean))].sort();const m={};ps.forEach((p,i)=>m[p]=PALETTE[i%PALETTE.length]);return m;}
function filtered(){const f=v('dFrom'),t=v('dTo');return (DATA.posts||[]).filter(p=>(!f||(p.date||'')>=f)&&(!t||(p.date||'')<=t));}

function renderGroups(dim, containerId, otherLabel, colorFn){
  const posts=filtered();
  const metric=v('metric'), metricName=metric==='engagement'?'Engagement':'Impressions';
  const topN=+v('topN');
  const groups={};
  posts.forEach(p=>{const k=p[dim]||'(ไม่ระบุ)';(groups[k]=groups[k]||[]).push(p);});
  const order=Object.keys(groups).sort((a,b)=>sum(groups[b],metric)-sum(groups[a],metric));
  const cont=document.getElementById(containerId); cont.innerHTML='';
  if(!order.length){cont.innerHTML='<div class="card" style="color:var(--muted)">ไม่มีข้อมูลในช่วงที่เลือก</div>';return;}
  const oCol=dim==='network'?'pillar':'network';
  order.forEach(k=>{
    const all=groups[k];
    const arr=all.slice().sort((a,b)=>b[metric]-a[metric]).slice(0,topN);
    const color=colorFn(k);
    const rows=arr.map((p,i)=>`<tr><td class="rk">${i+1}</td><td style="white-space:nowrap">${p.date||''}</td>
      <td>${esc(p[oCol])}</td><td>${esc(p.profile)}</td>
      <td class="num">${(p.engagement||0).toLocaleString()}</td><td class="num">${(p.impressions||0).toLocaleString()}</td>
      <td class="msg">${esc(p.message)}</td><td>${p.link?`<a href="${p.link}" target="_blank">เปิด ↗</a>`:''}</td></tr>`).join('');
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<h3><span class="badge" style="background:${color}22;color:${color}">${esc(k)}</span>
      <span style="color:var(--muted);font-weight:400;margin-left:6px">Top ${arr.length} ตาม ${metricName} · ${all.length} โพสต์ · Eng รวม ${sum(all,'engagement').toLocaleString()}</span></h3>
      <div style="overflow-x:auto"><table><thead><tr><th>#</th><th>วันที่</th><th>${otherLabel}</th><th>Profile</th><th class="num">Engagement</th><th class="num">Impressions</th><th>Message</th><th>Link</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    cont.appendChild(card);
  });
}
function renderAll(){
  renderGroups('network','byPlatform','Pillar',k=>PLAT_COLORS[k]||'#888');
  const cm=pillarColorMap();
  renderGroups('pillar','byPillar','Network',k=>cm[k]||'#888');
}

function fmtU(s){const m=(s||'').match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})/);if(!m)return s||'-';
  const d=new Date(Date.UTC(+m[1],+m[2]-1,+m[3],+m[4],+m[5]));
  return d.toLocaleString('th-TH',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+' น.';}
function setSub(){const m=DATA.meta||{};
  document.getElementById('sub').textContent=`ข้อมูล: ${m.source||''} · ${(DATA.posts||[]).length} โพสต์`;
  document.getElementById('lastUpdate').textContent='🕒 อัปเดตล่าสุด: '+fmtU(m.generatedAt);}
function loadData(fresh){
  const btn=document.getElementById('refresh');
  if(btn){btn.disabled=true;btn.textContent='⏳ กำลังรีเฟรช...';}
  return fetch('content-data.json?'+(fresh?'fresh=1&':'')+Date.now()).then(r=>r.json()).then(d=>{DATA=d;setSub();renderAll();})
   .catch(e=>{document.getElementById('sub').textContent='โหลดข้อมูลไม่สำเร็จ';console.error(e);})
   .finally(()=>{if(btn){btn.disabled=false;btn.textContent='🔄 รีเฟรชข้อมูล';}});
}
loadData(false).then(()=>{
  document.getElementById('foot').textContent='จัดอันดับรายโพสต์จาก Google Sheet · เลือกช่วงวันที่/เมตริก/จำนวนได้';
  document.getElementById('apply').onclick=renderAll;
  document.getElementById('clear').onclick=()=>{['dFrom','dTo'].forEach(id=>document.getElementById(id).value='');document.getElementById('metric').value='engagement';document.getElementById('topN').value='5';renderAll();};
  document.getElementById('refresh').onclick=()=>loadData(true);
  ['metric','topN'].forEach(id=>document.getElementById(id).onchange=renderAll);
});
</script>
</body>
</html>
